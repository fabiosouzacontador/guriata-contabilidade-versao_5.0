# ==============================================================================
# ARQUIVO DE SEGREDOS DO STREAMLIT
# ==============================================================================
# Este arquivo armazena credenciais sensíveis de forma segura.
# NUNCA commit este arquivo no Git! Ele já está no .gitignore.
#
# Uso local: Crie este arquivo em .streamlit/secrets.toml
# Uso na nuvem (Streamlit Cloud): Configure via dashboard do projeto
# ==============================================================================

[database]
# Substitua pela SUA string de conexão real do Neon/PostgreSQL
DATABASE_URL = "postgresql://usuario:senha@host:porta/nome_do_banco?sslmode=require"

[security]
# Senha padrão para usuários de exemplo (opcional)
SENHA_PADRAO = "123"
