<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guriatã - Plataforma de Contabilidade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #004b8d 0%, #0066c0 100%);
            color: white;
            text-align: center;
        }
        .container {
            padding: 50px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 { font-size: 3rem; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            background: #f5a623;
            color: #004b8d;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn:hover { background: #ffb830; transform: scale(1.05); }
        .stats { display: flex; gap: 40px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
        .stat { text-align: center; }
        .stat-num { font-size: 2rem; font-weight: bold; color: #f5a623; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 Guriatã</h1>
        <h2>Plataforma de Ensino de Contabilidade</h2>
        <p>Aprenda contabilidade na prática com um ambiente completo e seguro.</p>
        <div class="stats">
            <div class="stat"><div class="stat-num">3</div><div>Perfis</div></div>
            <div class="stat"><div class="stat-num">80+</div><div>Contas</div></div>
            <div class="stat"><div class="stat-num">5</div><div>Relatórios</div></div>
        </div>
        <a href="/app" class="btn">🚀 Acessar Sistema</a>
        <p style="margin-top: 40px; font-size: 0.8rem;">Ambiente sandbox - Apenas dados fictícios</p>
    </div>
</body>
</html>
